const WS_URL = 'wss://badi-public.crowdmonitor.ch:9591/api';

async function fetchCityData() {
  try {
    const url = REMOTE_API_HOSTS.includes(location.hostname)
      ? 'https://mhueni.ch/util/pooldata.php'
      : 'util/pooldata.php';
    const res = await fetch(url);
    const data = await res.json();
    const map = new Map();
    for (const bath of data.baths) {
      if (bath.poiid) map.set(bath.poiid, bath);
    }
    cityDataByPoiid = map;
    for (const p of currentPools) {
      const d = map.get(POOLS[p.uid]?.poiid);
      if (d) p._cityData = d;
    }
    renderPools();
  } catch (err) {
    console.warn('City data fetch failed:', err);
  }
}

function getFavorites() {
  try { return JSON.parse(localStorage.getItem('badi-favorites') || '[]'); }

}

function setFavorites(uids) {
  localStorage.setItem('badi-favorites', JSON.stringify(uids));
}

function toggleFavorite(uid) {
  const favs = getFavorites();
  const idx = favs.indexOf(uid);
  if (idx >= 0) { favs.splice(idx, 1); }
  else { favs.push(uid); }
  setFavorites(favs);
  if (document.startViewTransition) {
    document.startViewTransition(() => renderPools());
  } else {
    renderPools();
  }
}

function isFav(uid) {
  return getFavorites().includes(uid);
}

function getCESTNow() {
  const s = new Date().toLocaleString('de-CH', { timeZone: 'Europe/Zurich', hour12: false });
  const [datePart, timePart] = s.split(', ');
  const [d, m] = datePart.split('.').map(Number);
  const [h, min] = timePart.split(':').map(Number);
  return { day: d, month: m - 1, hour: h + min / 60 };
}

function parseHours(s) {
  const [h1, h2] = s.split('–');
  const [sh, sm] = h1.split('.').map(Number);
  const [eh, em] = h2.split('.').map(Number);
  return { start: sh + (sm || 0) / 60, end: eh + (em || 0) / 60 };
}

function isOpen(uid) {
  const info = POOL_HOURS[uid];
  if (!info) return { status: 'unknown', label: 'Unbekannt' };
  const { day, month, hour } = getCESTNow();
  let period = null;
  for (const p of info.periods) {
    if (new Date(2026, month, day) >= new Date(2026, p.start.m, p.start.d) &&
        new Date(2026, month, day) <= new Date(2026, p.end.m, p.end.d)) {
      period = p; break;
    }
  }
  if (!period) return { status: 'closed', label: 'Geschlossen' };
  if (period.hours) {
    const r = parseHours(period.hours);
    if (hour >= r.start && hour < r.end) return { status: 'open', label: 'Offen' };
    return { status: 'closed', label: 'Geschlossen' };
  }
  const every = parseHours(period.everyWeather);
  if (hour >= every.start && hour < every.end) return { status: 'open', label: 'Offen' };
  const nice = parseHours(period.niceWeather);
  if (hour >= nice.start && hour < nice.end) return { status: 'maybe', label: 'Offen (bei schönem Wetter)' };
  return { status: 'closed', label: 'Geschlossen' };
}

function getDisplayLabel(pool, status, label) {
  if ((status === 'open' || status === 'maybe') && pool?._cityData) {
    const time = pool._cityData.dateModified?.slice(-5);
    if (pool._cityData.openClosedTextPlain === 'offen')
      return `offen (Wasser ${pool._cityData.temperatureWater}°C, ${time} Uhr)`;
    return `${pool._cityData.openClosedTextPlain} (${time} Uhr)`;
  }
  return label;
}

function getCardColor(displayLabel, hasData, pct) {
  if (displayLabel.toLowerCase().startsWith('geschlossen')) return 'grey';
  if (hasData && pct > 80) return 'red';
  if (hasData && pct > 50) return 'orange';
  return 'green';
}

function renderOpeningHours(uid) {
  const info = POOL_HOURS[uid];
  if (!info) return '';
  const hasWeather = !!info.periods[0].everyWeather;
  let html = '<table class="pool-hours-table">';
  if (hasWeather) {
    html += '<tr><th>Zeitraum</th><th>Jedes Wetter</th><th>Schönwetter</th></tr>';
    for (const p of info.periods) {
      html += `<tr><td>${p.label}</td><td>${p.everyWeather} Uhr</td><td>${p.niceWeather} Uhr</td></tr>`;
    }
  } else {
    html += '<tr><th>Zeitraum</th><th>Öffnungszeiten</th></tr>';
    for (const p of info.periods) {
      html += `<tr><td>${p.label}</td><td>${p.hours} Uhr</td></tr>`;
    }
  }
  html += '</table>';
  return html;
}

function sortPools(pools, favs) {
  return [...pools].sort((a, b) => {
    const aF = favs.includes(a.uid);
    const bF = favs.includes(b.uid);
    if (aF !== bF) return aF ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
}

function renderPools() {
  const grid = document.getElementById('grid');
  const favs = getFavorites();
  const sorted = sortPools(currentPools, favs);

  if (sorted.length === 0) {
    grid.innerHTML = '<div class="empty">Keine Daten verf&uuml;gbar</div>';
    return;
  }

  const expandedUids = new Set();
  document.querySelectorAll('.pool-card.expanded').forEach(card => {
    expandedUids.add(card.dataset.uid);
  });

  let html = '';
  for (const p of sorted) {
    const fav = favs.includes(p.uid);
    const hasData = p.currentfill != null;
    const total = Math.max(p.maxspace, 1);
    const fill = hasData ? Math.max(parseInt(p.currentfill) || 0, 0) : 0;
    const pct = Math.min(100, Math.round((fill / total) * 100));
    const displayFill = hasData ? fill : '?';
    const { status, label } = isOpen(p.uid);
    const displayLabel = getDisplayLabel(p, status, label);
    const cardColor = getCardColor(displayLabel, hasData, pct);

    html += `
      <div class="pool-card ${cardColor}${fav ? ' favorite' : ''}${expandedUids.has(p.uid) ? ' expanded' : ''}" data-uid="${p.uid}" style="--fill: ${pct}%">
        <div class="pool-card-head">
          <button class="star-btn" data-uid="${p.uid}" title="Favorit">${fav
            ? '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="#000" stroke="#000" stroke-width="1"/></svg>'
            : '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="none" stroke="#000" stroke-width="1"/></svg>'}</button>
          <div class="pool-name-group">
            <h2>${escHtml(p.name)}</h2>
            <span class="open-status">${displayLabel}</span>
          </div>
          <span class="visitor-count${!hasData || displayLabel.toLowerCase().startsWith('geschlossen') ? ' muted' : ''}">${displayFill}</span>
        </div>
        <div class="pool-details">${renderOpeningHours(p.uid)}</div>
      </div>`;
  }
  grid.innerHTML = html;

  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFavorite(btn.dataset.uid);
    });
  });

  document.querySelectorAll('.pool-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.star-btn')) return;
      card.classList.toggle('expanded');
    });
  });
}

function escHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status-badge ' + cls;
}


function connect() {
  if (ws) try { ws.close(); } catch {}

  try {
    ws = new WebSocket(WS_URL);
  } catch (err) {
    setStatus('Fehler', 'error');
    scheduleReconnect();
    return;
  }

  ws.onopen = () => {
    setStatus('Verbunden', 'connected');
    backoff = 1000;
    ws.send(JSON.stringify({ capture: true }));
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (Array.isArray(data)) {
        for (const p of data) {
          const poolDef = POOLS[p.uid];
          if (!poolDef) continue;
          const existing = currentPools.find(e => e.uid === p.uid);
          if (existing) {
            existing.currentfill = p.currentfill;
            existing.maxspace = p.maxspace;
          }
        }
        renderPools();
      }
    } catch (e) {
      console.warn('Parse error:', e);
    }
  };

  ws.onclose = () => {
    setStatus('Verbinde...', 'reconnecting');
    scheduleReconnect();
  };

  ws.onerror = () => {};
}

function scheduleReconnect() {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => {
    backoff = Math.min(backoff * 1.5, 30000);
    connect();
  }, backoff);
}

document.addEventListener('DOMContentLoaded', () => {
  currentPools = Object.entries(POOLS).map(([uid, def]) => ({
    uid, name: def.name, currentfill: null, maxspace: 1
  }));
  renderPools();
  fetchCityData();
  connect();
  setInterval(() => {
    document.querySelectorAll('.pool-card').forEach(card => {
      const uid = card.dataset.uid;
      const poolObj = currentPools.find(p => p.uid === uid);
      const { status, label } = isOpen(uid);
      const displayLabel = getDisplayLabel(poolObj, status, label);
      const el = card.querySelector('.open-status');
      if (el) {
        el.className = 'open-status';
        el.textContent = displayLabel;
      }
      const hasData = poolObj?.currentfill != null;
      const total = Math.max(poolObj?.maxspace ?? 1, 1);
      const fill = hasData ? Math.max(parseInt(poolObj.currentfill) || 0, 0) : 0;
      const pct = Math.min(100, Math.round((fill / total) * 100));
      const visitorEl = card.querySelector('.visitor-count');
      if (visitorEl) visitorEl.textContent = hasData ? fill : '?';
      card.className = card.className.replace(/\b(green|red|orange|grey)\b/g, '') + ' ' + getCardColor(displayLabel, hasData, pct);
    });
  }, 60000);
});
window.addEventListener('beforeunload', () => {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  if (ws) try { ws.close(); } catch {}
});
</script>
</body>
</html>
