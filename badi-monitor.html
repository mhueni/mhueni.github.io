<meta charset="UTF-8">

<title>Wo go bade in Züri?</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  line-height: 1.5;
}

.wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 16px;
}

.header {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  gap: 12px;
}

.header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-badge {
  font-size: 0.8rem;
  padding: 4px 12px;
  border-radius: 999px;
  font-weight: 600;
  color: #fff;
}

.status-badge.connected    { background: #2ecc71; }
.status-badge.reconnecting { background: #f39c12; }
.status-badge.error        { background: #e74c3c; }
.status-badge.disconnected  { background: #95a5a6; }


.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.pool-card {
  position: relative;
  border-radius: 12px;
  padding: 16px 20px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}

.pool-card::before {
  content: '';
  position: absolute;
  inset: 0;
  width: var(--fill);
  background: rgba(0,0,0,0.12);
  pointer-events: none;
}

.pool-card > * {
  position: relative;
}

.pool-card:hover {
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}

.pool-card.favorite {
  outline: 2px solid #95a5a6;
}

.pool-card.green  { background: #d4edda; }
.pool-card.orange { background: #ffe5b4; }
.pool-card.red    { background: #f8d7da; }

.pool-card-head {
  display: flex;
  align-items: center;
  gap: 8px;
}

.visitor-count {
  font-size: 1.5rem;
  font-weight: 700;
  margin-left: auto;
  white-space: nowrap;
}
.visitor-count.muted { color: #999; }

.pool-name-group {
  min-width: 0;
  flex: 1;
}
.pool-name-group h2 {
  font-size: 1.05rem;
  font-weight: 600;
  margin: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.open-status {
  font-size: 0.7rem;
  font-weight: 600;
  display: block;
  margin-top: 1px;
}
.open-status.open   { color: #1e8c3e; }
.open-status.maybe  { color: #b87a0a; }
.open-status.closed { color: #6b7a7a; }

.star-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 8px 0 0;
  line-height: 1;
  display: flex;
  align-items: center;
  transition: transform 0.15s;
  flex-shrink: 0;
}

.star-btn svg {
  width: 24px;
  height: 24px;
  display: block;
}

.star-btn:hover { transform: scale(1.2); }

.pool-card { cursor: pointer; }



.pool-details {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(0,0,0,0.1);
  font-size: 0.82rem;
}
.pool-card.expanded .pool-details { display: block; }

table.pool-hours-table {
  width: 100%;
  border-collapse: collapse;
  border: 0;
  border-top: 0;
}
table.pool-hours-table tbody { border: 0; }
table.pool-hours-table tr { border: 0; }
table.pool-hours-table th,
table.pool-hours-table td {
  padding: 3px 6px;
  text-align: left;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
table.pool-hours-table th {
  font-weight: 600;
  font-size: 0.78rem;
  border-top: 0;
}

.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 48px 16px;
  color: #8e8ea0;
  font-size: 1.1rem;
}

@media (max-width: 600px) {
  .grid {
    grid-template-columns: 1fr;
  }
  .header h1 {
    font-size: 1.25rem;
  }
}
</style>
</head>

const WS_URL = 'wss://badi-public.crowdmonitor.ch:9591/api';

let ws = null;
let reconnectTimer = null;
let backoff = 1000;
let currentPools = [];

function getFavorites() {
  try { return JSON.parse(localStorage.getItem('badi-favorites') || '[]'); }
  catch { return []; }
}

function setFavorites(uids) {
  localStorage.setItem('badi-favorites', JSON.stringify(uids));
}

function toggleFavorite(uid) {
  const favs = getFavorites();
  const idx = favs.indexOf(uid);
  if (idx >= 0) { favs.splice(idx, 1); }
  else { favs.push(uid); }
  setFavorites(favs);
  if (document.startViewTransition) {
    document.startViewTransition(() => renderPools());
  } else {
    renderPools();
  }
}

function isFav(uid) {
  return getFavorites().includes(uid);
}

function getCESTNow() {
  const s = new Date().toLocaleString('de-CH', { timeZone: 'Europe/Zurich', hour12: false });
  const [datePart, timePart] = s.split(', ');
  const [d, m] = datePart.split('.').map(Number);
  const [h, min] = timePart.split(':').map(Number);
  return { day: d, month: m - 1, hour: h + min / 60 };
}

function parseHours(s) {
  const [h1, h2] = s.split('–');
  const [sh, sm] = h1.split('.').map(Number);
  const [eh, em] = h2.split('.').map(Number);
  return { start: sh + (sm || 0) / 60, end: eh + (em || 0) / 60 };
}

function isOpen(uid) {
  const info = POOL_HOURS[uid];
  if (!info) return { status: 'unknown', label: 'Unbekannt' };
  const { day, month, hour } = getCESTNow();
  let period = null;
  for (const p of info.periods) {
    if (new Date(2026, month, day) >= new Date(2026, p.start.m, p.start.d) &&
        new Date(2026, month, day) <= new Date(2026, p.end.m, p.end.d)) {
      period = p; break;
    }
  }
  if (!period) return { status: 'closed', label: 'Geschlossen' };
  if (period.hours) {
    const r = parseHours(period.hours);
    if (hour >= r.start && hour < r.end) return { status: 'open', label: 'Offen' };
    return { status: 'closed', label: 'Geschlossen' };
  }
  const every = parseHours(period.everyWeather);
  if (hour >= every.start && hour < every.end) return { status: 'open', label: 'Offen' };
  const nice = parseHours(period.niceWeather);
  if (hour >= nice.start && hour < nice.end) return { status: 'maybe', label: 'Offen (bei schönem Wetter)' };
  return { status: 'closed', label: 'Geschlossen' };
}

function renderOpeningHours(uid) {
  const info = POOL_HOURS[uid];
  if (!info) return '';
  const hasWeather = !!info.periods[0].everyWeather;
  let html = '<table class="pool-hours-table">';
  if (hasWeather) {
    html += '<tr><th>Zeitraum</th><th>Jedes Wetter</th><th>Schönwetter</th></tr>';
    for (const p of info.periods) {
      html += `<tr><td>${p.label}</td><td>${p.everyWeather} Uhr</td><td>${p.niceWeather} Uhr</td></tr>`;
    }
  } else {
    html += '<tr><th>Zeitraum</th><th>Öffnungszeiten</th></tr>';
    for (const p of info.periods) {
      html += `<tr><td>${p.label}</td><td>${p.hours} Uhr</td></tr>`;
    }
  }
  html += '</table>';
  return html;
}

function sortPools(pools) {
  const favs = getFavorites();
  return [...pools].sort((a, b) => {
    const aF = favs.includes(a.uid);
    const bF = favs.includes(b.uid);
    if (aF !== bF) return aF ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
}

function renderPools() {
  const grid = document.getElementById('grid');
  const sorted = sortPools(currentPools);

  if (sorted.length === 0) {
    grid.innerHTML = '<div class="empty">Keine Daten verf&uuml;gbar</div>';
    return;
  }

  const expandedUids = new Set();
  document.querySelectorAll('.pool-card.expanded').forEach(card => {
    expandedUids.add(card.dataset.uid);
  });

  let html = '';
  for (const p of sorted) {
    const fav = isFav(p.uid);
    const total = Math.max(p.maxspace, 1);
    const fill = Math.max(parseInt(p.currentfill) || 0, 0);
    const pct = Math.min(100, Math.round((fill / total) * 100));
    const { status, label } = isOpen(p.uid);

    let cardColor = 'green';
    if (pct > 80) cardColor = 'red';
    else if (pct >= 50) cardColor = 'orange';

    html += `
      <div class="pool-card ${cardColor}${fav ? ' favorite' : ''}${expandedUids.has(p.uid) ? ' expanded' : ''}" data-uid="${p.uid}" style="--fill: ${pct}%">
        <div class="pool-card-head">
          <button class="star-btn" data-uid="${p.uid}" title="Favorit">${fav
            ? '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="#000" stroke="#000" stroke-width="1"/></svg>'
            : '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="none" stroke="#000" stroke-width="1"/></svg>'}</button>
          <div class="pool-name-group">
            <h2>${escHtml(p.name)}</h2>
            <span class="open-status ${status}">${label}</span>
          </div>
          <span class="visitor-count${status === 'closed' ? ' muted' : ''}">${fill}</span>
        </div>
        <div class="pool-details">${renderOpeningHours(p.uid)}</div>
      </div>`;
  }
  grid.innerHTML = html;

  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFavorite(btn.dataset.uid);
    });
  });

  document.querySelectorAll('.pool-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.star-btn')) return;
      card.classList.toggle('expanded');
    });
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status-badge ' + cls;
}


function connect() {
  if (ws) try { ws.close(); } catch {}

  try {
    ws = new WebSocket(WS_URL);
  } catch (err) {
    setStatus('Fehler', 'error');
    scheduleReconnect();
    return;
  }

  ws.onopen = () => {
    setStatus('Verbunden', 'connected');
    backoff = 1000;
    ws.send(JSON.stringify({ capture: true }));
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (Array.isArray(data)) {
        currentPools = data.filter(p => WHITELIST.has(p.uid));
        renderPools();
      }
    } catch (e) {
      console.warn('Parse error:', e);
    }
  };

  ws.onclose = () => {
    setStatus('Wiederverbinde...', 'reconnecting');
    scheduleReconnect();
  };

  ws.onerror = () => {};
}

function scheduleReconnect() {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => {
    backoff = Math.min(backoff * 1.5, 30000);
    connect();
  }, backoff);
}

document.addEventListener('DOMContentLoaded', () => {
  connect();
  setInterval(() => {
    document.querySelectorAll('.pool-card').forEach(card => {
      const { status, label } = isOpen(card.dataset.uid);
      const el = card.querySelector('.open-status');
      if (el) { el.className = 'open-status ' + status; el.textContent = label; }
    });
  }, 60000);
});
window.addEventListener('beforeunload', () => {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  if (ws) try { ws.close(); } catch {}
});
